<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Site en construction</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #ffffff;
      color: #111827;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .container {
      max-width: 640px;
    }
    h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 600;
      margin: 0 0 16px;
      letter-spacing: -0.02em;
    }
    p {
      font-size: 1.05rem;
      line-height: 1.7;
      color: #6b7280;
      margin: 0;
    }
    .line {
      width: 72px;
      height: 1px;
      background: #d1d5db;
      margin: 0 auto 32px;
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="line"></div>
    <h1>Site en construction</h1>
    <p>
      Notre site arrive bientôt.<br />
      Merci de votre visite et à très vite.
    </p>
  </main>
</body>
</html>
